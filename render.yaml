services:
  - type: web
    name: isg-suite-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.14
      - key: DATABASE_URL
        fromDatabase:
          name: isg-suite-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://isg-suite-web.onrender.com

  - type: web
    name: isg-suite-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://isg-suite-api.onrender.com/api/v1

databases:
  - name: isg-suite-db
    databaseName: isgsuite
    user: isgsuite
