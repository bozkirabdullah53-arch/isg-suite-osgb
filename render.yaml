services:
  - type: web
    name: isg-suite-api
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: sh start.sh
    healthCheckPath: /health
    branch: master
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      # P0: production sertleştirmesi (SECRET_KEY doğrulama + migration fail-fast)
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: isg-suite-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://www.isgsuite.tr
      # Seed admin: Render Dashboard > Environment (sync: false)
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      # Optional ClamAV (B-01): set CLAMAV_HOST when clamd is reachable
      - key: CLAMAV_HOST
        sync: false

  # B-03: free-tier sleep önleme — /health ping (UTC, ~$1/ay minimum)
  - type: cron
    name: isg-suite-api-warmup
    runtime: python
    rootDir: backend
    schedule: "*/14 * * * *"
    buildCommand: "true"
    startCommand: python scripts/warmup_ping.py
    branch: master
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: WARMUP_API_URL
        value: https://isg-suite-api-1u9t.onrender.com

  - type: web
    name: isg-suite-web
    runtime: static
    rootDir: frontend
    # Global npm pin Render'da sık kırılıyor; Node 20 + npm ci yeterli
    buildCommand: npm ci --no-audit --no-fund && npm run build
    staticPublishPath: dist
    branch: master
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: VITE_API_URL
        value: https://isg-suite-api-1u9t.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: isg-suite-db
    databaseName: isgsuite
    user: isgsuite
