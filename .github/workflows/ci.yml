name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-sqlite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install
        run: pip install -r requirements.txt
      - name: Pytest (SQLite)
        env:
          ENVIRONMENT: development
          SECRET_KEY: ci-secret-key-at-least-32-characters-long
          DATABASE_URL: sqlite:///./ci_test.db
        run: pytest -q

  backend-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: isg
          POSTGRES_PASSWORD: isg
          POSTGRES_DB: isg_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U isg -d isg_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ENVIRONMENT: development
      SECRET_KEY: ci-secret-key-at-least-32-characters-long
      DATABASE_URL: postgresql+psycopg://isg:isg@localhost:5432/isg_ci
      CI_POSTGRES: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install
        run: pip install -r requirements.txt
      - name: Alembic upgrade head
        run: alembic upgrade head
      - name: Postgres schema parity
        run: python scripts/ci_postgres_parity.py
      - name: Pytest (Postgres parity)
        run: pytest -q tests/test_ci_postgres_parity.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Audit
        run: npm audit --omit=dev
      - name: Build
        run: npm run build
